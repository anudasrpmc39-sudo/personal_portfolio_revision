<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: ["A","B","C"],
    datasets: [{
      label: "Data",
      data: [10,20,30]
    }]
  }
});
</script>

</body>
</html>
